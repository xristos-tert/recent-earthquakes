<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Viewer: Live Earthquakes</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        <aside class="glass-panel" id="sidebar">
            <header>
                <h1>Geo-Viewer</h1>
                <p>Global Earthquakes (Past 24h > 2.5 Mag)</p>
            </header>
            <div id="stats">
                <div class="stat-box">
                    <span class="stat-label">Total Quakes</span>
                    <span class="stat-value" id="total-quakes">-</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Max Magnitude</span>
                    <span class="stat-value" id="max-magnitude">-</span>
                </div>
            </div>
            <div id="list-container">
                <ul id="quake-list">
                    <!-- List items will be generated by JS -->
                </ul>
            </div>
            <footer>
                <p>Data by USGS</p>
            </footer>
        </aside>
        <main id="map-container">
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Turf.js for Spatial Analysis -->
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
